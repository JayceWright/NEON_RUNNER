<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>NEON RUNNER</title>
  <meta name="description" content="NEON_RUNNER — A cyberpunk infinite runner game built with Three.js" />
  
  <!-- Three.js r128 (CDN — UMD bundle, exposes global THREE) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://unpkg.com/meshoptimizer@0.19.0/meshopt_decoder.js"></script>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Google Fonts: Sora -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sora: ['Sora', 'sans-serif'] },
          colors: {
            neonPink: '#ff2d78',
            neonCyan: '#00f3ff',
            neonYellow: '#fefe00',
            darkBg: '#0a0a0c',
          },
          boxShadow: {
            'neon-pink': '0 0 15px rgba(255, 45, 120, 0.6)',
            'neon-cyan': '0 0 15px rgba(0, 243, 255, 0.4)',
          }
        }
      }
    }
  </script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="/style.css" />
</head>

<body class="h-screen w-full relative select-none">
  
  <!-- 3D Canvas -->
  <div id="game-container" class="absolute inset-0 z-0"></div>
  <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-black/60 z-0 pointer-events-none"></div>

  <!-- HUD -->
  <div id="ui-layer" class="absolute inset-0 z-20 pointer-events-none">
    
    <!-- Logo + Controls -->
    <header class="absolute top-0 left-0 w-full p-8 flex justify-between items-start">
      <h1 class="text-2xl font-extrabold tracking-tighter text-neonPink text-glow-pink italic">NEON_RUNNER</h1>
      <div class="flex flex-col text-right space-y-1 text-white">
        <div class="text-[10px] font-bold tracking-widest text-zinc-400 uppercase">Controls</div>
        <div class="text-sm tracking-widest">A / ← &nbsp; D / →</div>
        <span class="text-neonPink text-sm font-bold">SPACE = Jump</span>
      </div>
    </header>

    <!-- Score HUD -->
    <div class="absolute top-8 left-1/2 -translate-x-1/2 flex items-center gap-12 bg-black/40 backdrop-blur-sm px-8 py-3 rounded-full border border-neonPink/30 shadow-none">
      <!-- High Score -->
      <div class="text-center">
        <p class="text-[10px] text-zinc-500 font-semibold uppercase tracking-widest mb-1 mt-1">High Score</p>
        <p class="text-xl font-bold text-zinc-300 leading-none" id="high-score">0</p>
      </div>

      <!-- Distance -->
      <div class="text-center border-x border-neonPink/20 px-12">
        <p class="text-[10px] text-neonPink font-semibold uppercase tracking-widest mb-1 mt-1">Distance</p>
        <p class="text-4xl font-black text-white leading-none" id="current-score">0</p>
      </div>

      <!-- System Status Minimal -->
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-neonPink shadow-neon-pink animate-pulse"></div>
        <span class="text-[10px] font-bold text-zinc-400 tracking-widest">SYSTEM ACTIVE</span>
      </div>
    </div>

    <!-- Speed -->
    <div class="absolute left-8 top-1/2 -translate-y-1/2 space-y-4">
      <div class="hud-glass-cyan p-4 rounded-lg border-l-4 border-l-neonCyan w-40">
        <p class="text-[10px] text-neonCyan font-bold uppercase tracking-widest mb-1">Current Speed</p>
        <div class="flex items-baseline gap-1">
          <span class="text-3xl font-black text-white" id="speed-display">0</span>
          <span class="text-xs font-bold text-zinc-400 uppercase">km/h</span>
        </div>
      </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-md z-50 pointer-events-auto">
      <h2 class="text-6xl font-black text-neonCyan text-glow-cyan italic mb-4">INITIALIZE RUN</h2>
      <p id="loading-text" class="text-neonPink text-xl tracking-widest font-bold mb-4 animate-pulse">LOADING MODEL...</p>
      <button id="start-btn" onclick="startGame()" style="display:none;" class="mt-8 px-12 py-4 border-2 border-neonCyan hover:bg-neonCyan hover:text-black text-white font-bold tracking-widest uppercase rounded transition-all">
        START
      </button>
    </div>

    <!-- Game Over -->
    <div id="game-over-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 backdrop-blur-md z-40 pointer-events-auto">
      <h2 class="text-7xl font-black text-neonPink text-glow-pink italic mb-4">CRASHED!</h2>
      <p class="text-xl text-white mb-8 tracking-widest">SCORE: <span id="final-score" class="font-bold text-neonCyan text-glow-cyan text-4xl ml-4">0</span></p>
      <button onclick="startGame()" class="px-12 py-4 bg-neonPink hover:bg-pink-600 text-white font-bold tracking-widest uppercase rounded shadow-neon-pink transition-all">
        REBOOT SYSTEM
      </button>
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen" style="display:none" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 backdrop-blur-sm z-45 pointer-events-auto">
      <h2 class="text-5xl font-black text-neonCyan text-glow-cyan italic mb-4">PAUSED</h2>
      <p class="text-lg text-white/70 tracking-widest mb-6">Press <span class="text-neonPink font-bold">ESC</span> or <span class="text-neonPink font-bold">P</span> to resume</p>
    </div>

    <!-- Bottom Nav -->
    <footer class="absolute bottom-0 left-0 w-full">
      <nav class="bg-darkBg/95 backdrop-blur-md border-t border-zinc-800 px-12 py-4 flex justify-around items-center">
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] font-bold tracking-[0.2em] text-neonPink uppercase">Run</span>
          <div class="h-1 w-8 bg-neonPink mt-1 rounded-full"></div>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-50">
          <span class="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase">Crew</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-50">
          <span class="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase">Vault</span>
        </div>
      </nav>
    </footer>
  </div>

  <!-- Game Module -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
