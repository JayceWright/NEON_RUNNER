<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>NEON RUNNER</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Three.js (r128) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <!-- Meshopt Decoder for compressed Tripo models -->
  <script src="https://unpkg.com/meshoptimizer@0.19.0/meshopt_decoder.js"></script>

  <!-- Google Fonts: Sora -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sora: ['Sora', 'sans-serif'] },
          colors: {
            neonPink: '#ff2d78',
            neonCyan: '#00f3ff',
            neonYellow: '#fefe00',
            darkBg: '#0a0a0c',
          },
          boxShadow: {
            'neon-pink': '0 0 15px rgba(255, 45, 120, 0.6)',
            'neon-cyan': '0 0 15px rgba(0, 243, 255, 0.4)',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Sora', sans-serif;
      background-color: #000;
      color: #ffffff;
      margin: 0;
      overflow: hidden;
    }
    .text-glow-pink { text-shadow: 0 0 8px #ff2d78, 0 0 12px #ff2d78; }
    .text-glow-cyan { text-shadow: 0 0 8px #00f3ff; }
    .hud-glass {
      background: rgba(10, 10, 12, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 45, 120, 0.3);
    }
    .hud-glass-cyan {
      background: rgba(10, 10, 12, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 243, 255, 0.3);
    }
    #game-over-screen { display: none; }
    #start-screen { display: flex; }
    /* Prevent default touch actions like pull-to-refresh */
    canvas { touch-action: none; }
  </style>
</head>

<body class="h-screen w-full relative select-none">
  
  <!-- 3D Canvas -->
  <div id="game-container" class="absolute inset-0 z-0"></div>
  <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-black/60 z-0 pointer-events-none"></div>

  <!-- HUD -->
  <div id="ui-layer" class="absolute inset-0 z-20 pointer-events-none">
    
    <!-- Logo + Controls -->
    <header class="absolute top-0 left-0 w-full p-8 flex justify-between items-start">
      <h1 class="text-2xl font-extrabold tracking-tighter text-neonPink text-glow-pink italic">NEON_RUNNER</h1>
      <div class="flex flex-col text-right space-y-1 text-white">
        <div class="text-[10px] font-bold tracking-widest text-zinc-400 uppercase">Controls</div>
        <div class="text-sm tracking-widest">A / ← &nbsp; D / →</div>
        <span class="text-neonPink text-sm font-bold">SPACE = Jump</span>
      </div>
    </header>

    <!-- Score HUD -->
    <div class="absolute top-8 left-1/2 -translate-x-1/2 w-full max-w-md">
      <div class="hud-glass rounded-lg p-4 text-center border-t-2 border-neonPink shadow-neon-pink">
        <div class="inline-block px-3 py-1 border border-neonPink rounded text-[10px] font-bold text-neonPink mb-3 tracking-widest">SYSTEM ACTIVE</div>
        <div class="flex justify-between items-end gap-8">
          <div class="text-left">
            <p class="text-[10px] text-zinc-400 font-semibold uppercase tracking-wider">High Score</p>
            <p class="text-xl font-bold" id="high-score">0</p>
          </div>
          <div class="text-right">
            <p class="text-[10px] text-zinc-400 font-semibold uppercase tracking-wider">Distance</p>
            <p class="text-4xl font-black text-neonPink text-glow-pink" id="current-score">0</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Speed -->
    <div class="absolute left-8 top-1/2 -translate-y-1/2 space-y-4">
      <div class="hud-glass-cyan p-4 rounded-lg border-l-4 border-l-neonCyan w-40">
        <p class="text-[10px] text-neonCyan font-bold uppercase tracking-widest mb-1">Current Speed</p>
        <div class="flex items-baseline gap-1">
          <span class="text-3xl font-black text-white" id="speed-display">0</span>
          <span class="text-xs font-bold text-zinc-400 uppercase">km/h</span>
        </div>
      </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-md z-50 pointer-events-auto">
      <h2 class="text-6xl font-black text-neonCyan text-glow-cyan italic mb-4">INITIALIZE RUN</h2>
      <p id="loading-text" class="text-neonPink text-xl tracking-widest font-bold mb-4 animate-pulse">LOADING MODEL...</p>
      <button id="start-btn" onclick="startGame()" style="display:none;" class="mt-8 px-12 py-4 border-2 border-neonCyan hover:bg-neonCyan hover:text-black text-white font-bold tracking-widest uppercase rounded transition-all">
        START
      </button>
    </div>

    <!-- Game Over -->
    <div id="game-over-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 backdrop-blur-md z-40 pointer-events-auto">
      <h2 class="text-7xl font-black text-neonPink text-glow-pink italic mb-4">CRASHED!</h2>
      <p class="text-xl text-white mb-8 tracking-widest">SCORE: <span id="final-score" class="font-bold text-neonCyan text-glow-cyan text-4xl ml-4">0</span></p>
      <button onclick="startGame()" class="px-12 py-4 bg-neonPink hover:bg-pink-600 text-white font-bold tracking-widest uppercase rounded shadow-neon-pink transition-all">
        REBOOT SYSTEM
      </button>
    </div>

    <!-- Pause Screen -->
    <div id="pause-screen" style="display:none" class="absolute inset-0 flex flex-col items-center justify-center bg-black/70 backdrop-blur-sm z-45 pointer-events-auto">
      <h2 class="text-5xl font-black text-neonCyan text-glow-cyan italic mb-4">PAUSED</h2>
      <p class="text-lg text-white/70 tracking-widest mb-6">Press <span class="text-neonPink font-bold">ESC</span> or <span class="text-neonPink font-bold">P</span> to resume</p>
    </div>

    <!-- Bottom Nav -->
    <footer class="absolute bottom-0 left-0 w-full">
      <nav class="bg-darkBg/95 backdrop-blur-md border-t border-zinc-800 px-12 py-4 flex justify-around items-center">
        <div class="flex flex-col items-center gap-1">
          <span class="text-[10px] font-bold tracking-[0.2em] text-neonPink uppercase">Run</span>
          <div class="h-1 w-8 bg-neonPink mt-1 rounded-full"></div>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-50">
          <span class="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase">Crew</span>
        </div>
        <div class="flex flex-col items-center gap-1 opacity-50">
          <span class="text-[10px] font-bold tracking-[0.2em] text-zinc-500 uppercase">Vault</span>
        </div>
      </nav>
    </footer>
  </div>

  <script>
    const container   = document.getElementById('game-container');
    const scoreUI     = document.getElementById('current-score');
    const highScoreUI = document.getElementById('high-score');
    const speedUI     = document.getElementById('speed-display');
    const gameOverScreen = document.getElementById('game-over-screen');
    const startScreen    = document.getElementById('start-screen');
    const finalScoreUI   = document.getElementById('final-score');
    const loadingText    = document.getElementById('loading-text');
    const startBtn       = document.getElementById('start-btn');

    let scene, camera, renderer;
    let isRunning = false;
    let isPaused  = false;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('neon_runner_high')) || 0;
    highScoreUI.innerText = highScore.toLocaleString();

    // Player
    let player;
    let charModel = null;  // reference to actual 3D model mesh for rotation locking
    let mixer = null;
    let runAction = null;
    let jumpAction = null;
    let playerSpeed = 20;
    let playerLane  = 0;      // -1, 0, 1
    const laneWidth = 3;
    let targetX = 0;

    // Physics
    let velocityY = 0;
    let isJumping = false;
    const gravity   = -70;
    const jumpForce = 22;

    // Environment
    let platforms = [];
    const platformDepth = 4;
    let spawnZ = 4;
    const MAGENTA = 0xff0055;
    const CYAN    = 0x00f3ff;

    // Shared Resources (Optimization: reuse same objects instead of creating new ones)
    let sharedPlatformGeo;
    let sharedMatMagenta, sharedMatCyan;
    let buildingGeo, buildingEdgesGeo;

    // Mobile Controls
    let touchStartX = 0;
    let touchStartY = 0;
    let touchActive = false; // To prevent multiple swipes per touch
    const swipeThreshold = 25; // Lower threshold for faster response

    // FOR TESTING: Immortal mode (will not trigger game over)
    window.GOD_MODE = false;

    // ─── 3D INIT ─────────────────────────────────────────────────────────────────
    function init3D() {
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x0a0a0c, 0.04);

      camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 1000);

      // RESTORED: High quality settings
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      // Pre-create shared resources
      sharedPlatformGeo = new THREE.BoxGeometry(laneWidth - 0.2, 0.5, platformDepth);
      
      const matConfig = {
        color: 0x111122,
        emissiveIntensity: 0.35,
        roughness: 0.1,
        metalness: 0.8,
        clearcoat: 1.0,
        clearcoatRoughness: 0.1,
        transparent: true, 
        opacity: 0.95
      };
      
      sharedMatMagenta = new THREE.MeshPhysicalMaterial({ ...matConfig, emissive: MAGENTA });
      sharedMatCyan    = new THREE.MeshPhysicalMaterial({ ...matConfig, emissive: CYAN    });
      
      buildingGeo = new THREE.BoxGeometry(1, 1, 1); // We'll scale it instead of creating new geo
...

      // Pure ambient — the character's own point light does the work
      scene.add(new THREE.AmbientLight(0xddeeff, 1.2));

      // Silver glow PointLight attached to player — character illuminates itself
      // (added after player group exists below)

      // Distant Neon Portal (replaces the boring flat circle)
      // Outer ring
      const torusGeo = new THREE.TorusGeometry(55, 3, 16, 100);
      const torusMat = new THREE.MeshBasicMaterial({ color: CYAN, fog: false });
      window.bgPortal = new THREE.Mesh(torusGeo, torusMat);
      window.bgPortal.position.set(0, 28, -700);
      scene.add(window.bgPortal);

      // Inner ring (smaller, magenta)
      const innerGeo = new THREE.TorusGeometry(38, 1.5, 16, 100);
      const innerMat = new THREE.MeshBasicMaterial({ color: MAGENTA, fog: false });
      const innerRing = new THREE.Mesh(innerGeo, innerMat);
      innerRing.position.copy(window.bgPortal.position);
      scene.add(innerRing);
      window.bgPortalInner = innerRing;

      // Center glow disk
      const diskGeo = new THREE.CircleGeometry(36, 64);
      const diskMat = new THREE.MeshBasicMaterial({ color: 0x002233, transparent: true, opacity: 0.7, fog: false });
      const disk = new THREE.Mesh(diskGeo, diskMat);
      disk.position.copy(window.bgPortal.position);
      disk.position.z += 0.1;
      scene.add(disk);
      window.bgDisk = disk;

      // Deep floor grid — simple 3-line approach, no material mutation issues
      window.floorGrid = new THREE.GridHelper(600, 120, 0x001122, 0x001122);
      window.floorGrid.position.set(0, -20, -200);
      scene.add(window.floorGrid);

      // Player group + temp wireframe cube
      player = new THREE.Group();
      const tGeo = new THREE.BoxGeometry(1, 1.5, 1);
      const tMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
      const tMesh = new THREE.Mesh(tGeo, tMat);
      player.add(tMesh);

      // Self-illuminating silver PointLight on the character
      const charGlow = new THREE.PointLight(0xaaccff, 5.0, 18);  // stronger + wider
      charGlow.position.set(0, 1, 0);
      player.add(charGlow);
      // Second glow at head height for top-down illumination
      const headGlow = new THREE.PointLight(0xffffff, 2.0, 8);
      headGlow.position.set(0, 4, 0);
      player.add(headGlow);

      scene.add(player);

      loadModel(tMesh, tGeo, tMat);

      window.addEventListener('keydown', onKey);
      window.addEventListener('resize', onResize);
      
      // Mobile touch listeners - moved to move for instant reaction
      window.addEventListener('touchstart', handleTouchStart, { passive: false });
      window.addEventListener('touchmove', handleTouchMove, { passive: false });
      window.addEventListener('touchend', () => { touchActive = false; }, { passive: false });
    }

    // ─── TOUCH HANDLERS ───────────────────────────────────────────────────────────
    function handleTouchStart(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchActive = true;
    }

    function handleTouchMove(e) {
      if (!isRunning || isPaused || !touchActive) return;
      
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      
      if (Math.abs(dx) > swipeThreshold || Math.abs(dy) > swipeThreshold) {
        if (Math.abs(dx) > Math.abs(dy)) {
          // Horizontal swipe
          if (dx > swipeThreshold && playerLane < 1) {
            playerLane++;
            touchActive = false; // Swipe consumed
          } else if (dx < -swipeThreshold && playerLane > -1) {
            playerLane--;
            touchActive = false; // Swipe consumed
          }
        } else {
          // Vertical swipe
          if (dy < -swipeThreshold && !isJumping) {
            triggerJump();
            touchActive = false; // Swipe consumed
          }
        }
      }
      
      // Prevent scrolling while playing
      if (e.cancelable) e.preventDefault();
    }

    function handleTouchEnd(e) {
      touchActive = false;
    }

    function triggerJump() {
      if (isJumping) return;
      velocityY = jumpForce;
      isJumping = true;
      if (window.jumpFlash) window.jumpFlash();
      if (jumpAction && runAction) {
         runAction.fadeOut(0.1);
         jumpAction.reset().fadeIn(0.1).play();
         setTimeout(function() {
           if (isJumping) {
             jumpAction.fadeOut(0.15);
             runAction.reset().fadeIn(0.15).play();
           }
         }, 250);
      }
    }

    // ─── MODEL LOADING ────────────────────────────────────────────────────────────
    function loadModel(tMesh, tGeo, tMat) {
      const L1 = new THREE.GLTFLoader();
      if (typeof MeshoptDecoder !== 'undefined') L1.setMeshoptDecoder(MeshoptDecoder);

      // Step 1 – load the main rigged mesh (11 MB)
      L1.load(
        'tripo_rigging_df631e0e-4b3e-484b-8408-c58b35caa963_meshopt.glb',
        function (gltf) {
          player.remove(tMesh);
          tGeo.dispose();
          tMat.dispose();

          const model = gltf.scene;

          // --- Scale: adjust MODEL_SCALE if too big/small ---
          const MODEL_SCALE = 3.5;
          model.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);
          // Baseline rotation (will be actively locked in gameLoop to prevent animation spin)
          model.rotation.y = Math.PI;  
          model.position.set(0, -0.75, 0);  // feet on platform

          // Keep original textures + add subtle emissive glow (stays grey, just brighter)
          model.traverse(function (child) {
            if (child.isMesh) {
              child.castShadow = true;
              if (child.material) {
                // Clone material to avoid mutating shared instances
                child.material = child.material.clone();
                child.material.emissive = new THREE.Color(0x333333);
                child.material.emissiveIntensity = 0.8;
              }
            }
          });

          // Helper: flash model bright white on jump, then restore to baseline glow
          window.jumpFlash = function() {
            model.traverse(function(child) {
              if (child.isMesh && child.material && child.material.emissive !== undefined) {
                child.material.emissive.set(0xffffff);
                child.material.emissiveIntensity = 1.5;  // super bright flash
              }
            });
            setTimeout(function() {
              // Restore to the permanent baseline glow (0x333333 @ 0.8)
              model.traverse(function(child) {
                if (child.isMesh && child.material && child.material.emissive !== undefined) {
                  child.material.emissive.set(0x333333);  // back to baseline grey glow
                  child.material.emissiveIntensity = 0.8;
                }
              });
            }, 200);
          };

          player.add(model);
          charModel = model;   // <<< save global reference for rotation lock
          mixer = new THREE.AnimationMixer(model);

          if (gltf.animations && gltf.animations.length > 0) {
            // Rigging file already has embedded animations
            console.log('Rigging file has animations:', gltf.animations.length);
            gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            readyToStart();
          } else {
            // Load ALL unique retarget animation files
            loadingText.innerText = 'LOADING ANIMATIONS...';
            const retargetFiles = [
              'tripo_retarget_d92c8157-c67a-416f-90e5-5a791d58aa2c.glb',
              'tripo_retarget_b420ba5a-af77-45a8-a029-3e35c73d054e.glb',
              'tripo_retarget_bb9b64f8-3b22-447a-978c-0155ff61b026.glb',
              'tripo_retarget_9c2b3a83-75d2-4a81-8427-b3c33f275094.glb',
              'tripo_retarget_03ecbc1e-6142-4ecb-8326-81bf2c940550.glb',
            ];

            let loaded = 0;

            retargetFiles.forEach((file, index) => {
              const Ln = new THREE.GLTFLoader();
              Ln.load(
                file,
                function (rGltf) {
                  console.log(file, '-> animations:', rGltf.animations.length);
                  rGltf.animations.forEach((clip, ci) => {
                    const action = mixer.clipAction(clip);
                    // DEFAULT: Первым файлом загружаем анимацию бега
                    if (index === 0 && ci === 0) {
                      action.play();
                      runAction = action;
                    }
                    // ВТОРЫМ файлом загружаем анимацию прыжка
                    if (index === 1 && ci === 0) {
                      jumpAction = action;
                      jumpAction.setLoop(THREE.LoopOnce, 1);
                      jumpAction.clampWhenFinished = false; // don't freeze at the end
                      jumpAction.timeScale = 3.0;           // play 3x faster = snappy flash
                    }
                    window._animations = window._animations || [];
                    window._animations.push({ name: file, clip, action });
                  });
                  loaded++;
                  if (loaded === retargetFiles.length) readyToStart();
                },
                undefined,
                function (err) {
                  console.warn('Could not load', file, err.message);
                  loaded++;
                  if (loaded === retargetFiles.length) readyToStart();
                }
              );
            });
          }
        },
        undefined,
        function (err) {
          console.error('Model load error:', err);
          loadingText.innerText = 'MODEL ERROR: ' + err.message;
        }
      );
    }

    function readyToStart() {
      loadingText.style.display = 'none';
      startBtn.style.display = 'block';
    }

    // ─── PLATFORM GENERATION ──────────────────────────────────────────────────────
    function createPlatformRow(forceNoHole) {
      const holeChance = forceNoHole ? -1 : 0.4 + (playerSpeed / 100);
      const gapLane = Math.random() < holeChance ? Math.floor(Math.random() * 3) - 1 : 99;

      for (let lane = -1; lane <= 1; lane++) {
        if (lane === gapLane) continue;

        const isMagenta = Math.random() > 0.5;
        const edgeColor = isMagenta ? MAGENTA : CYAN;
        const sharedMat = isMagenta ? sharedMatMagenta : sharedMatCyan;

        // Using pre-created geometry and material (Optimization: No "new" objects here)
        const mesh = new THREE.Mesh(sharedPlatformGeo, sharedMat);
        mesh.position.set(lane * laneWidth, -0.75, spawnZ);

        const line = new THREE.LineSegments(
          new THREE.EdgesGeometry(sharedPlatformGeo), // Edges are slightly tricky to reuse but we'll manage
          new THREE.LineBasicMaterial({ color: edgeColor })
        );
        line.name = 'wireframe';
        mesh.add(line);

        mesh.userData = { isFalling: false, passed: false, isBuilding: false };
        scene.add(mesh);
        platforms.push(mesh);
      }

      // 3D Volume: Decorative buildings (Optimization: reuse buildingGeo)
      if (Math.random() > 0.2) {
        const sideDir = Math.random() > 0.5 ? 1 : -1;
        const sideX = sideDir * (15 + Math.random() * 25);
        const height = 10 + Math.random() * 50;
        const width = 5 + Math.random() * 10;
        
        const bMat = new THREE.MeshStandardMaterial({
          color: 0x050505, roughness: 1.0, emissive: 0x000000
        });
        
        const bMesh = new THREE.Mesh(buildingGeo, bMat);
        bMesh.scale.set(width, height, platformDepth * 2);
        bMesh.position.set(sideX, height/2 - 5, spawnZ);
        
        const bEdges = new THREE.LineSegments(
          new THREE.EdgesGeometry(buildingGeo),
          new THREE.LineBasicMaterial({ color: Math.random() > 0.5 ? MAGENTA : CYAN, transparent: true, opacity: 0.3 })
        );
        bMesh.add(bEdges);
        
        bMesh.userData = { isBuilding: true };
        scene.add(bMesh);
        platforms.push(bMesh);
      }

      spawnZ -= platformDepth;
    }

    // ─── GAME INIT ────────────────────────────────────────────────────────────────
    function initGame() {
      score = 0;
      playerSpeed = 20;
      playerLane = 0;
      targetX = 0;
      velocityY = 0;
      isJumping = false;
      spawnZ = 4;
      player.position.set(0, 0, 0);
      player.rotation.set(0, 0, 0);

      scoreUI.innerText = '0';
      speedUI.innerText = '140';
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';

      platforms.forEach(p => scene.remove(p));
      platforms = [];

      for (let i = 0; i < 30; i++) {
        createPlatformRow(i < 10);
      }

      isRunning = true;
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }
    window.startGame = () => initGame();

    // ─── INPUT ────────────────────────────────────────────────────────────────────
    function onKey(e) {
      // Pause toggle
      if (e.code === 'Escape' || e.code === 'KeyP') {
        if (isRunning && !isPaused) {
          isPaused = true;
          document.getElementById('pause-screen').style.display = 'flex';
          return;
        } else if (isPaused) {
          isPaused = false;
          document.getElementById('pause-screen').style.display = 'none';
          lastTime = performance.now();
          requestAnimationFrame(gameLoop);
          return;
        }
      }

      if (!isRunning || isPaused) {
        if ((e.code === 'Space' || e.code === 'Enter') && startScreen.style.display !== 'none') startGame();
        return;
      }
      if (e.code === 'ArrowLeft' || e.code === 'KeyA')  { if (playerLane > -1) playerLane--; }
      else if (e.code === 'ArrowRight' || e.code === 'KeyD') { if (playerLane < 1) playerLane++; }
      else if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') && !isJumping) {
        velocityY = jumpForce;
        isJumping = true;
        // Flash the model white at the moment of jump
        if (window.jumpFlash) window.jumpFlash();
        // Quick flash of jump animation, then auto-return to run
        if (jumpAction && runAction) {
           runAction.fadeOut(0.1);
           jumpAction.reset().fadeIn(0.1).play();
           setTimeout(function() {
             if (isJumping) {
               jumpAction.fadeOut(0.15);
               runAction.reset().fadeIn(0.15).play();
             }
           }, 250);
        }
      }
    }

    function onResize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    }

    // ─── GAME LOOP ────────────────────────────────────────────────────────────────
    let lastTime = 0;
    function gameLoop(time) {
      if (!isRunning || isPaused) return;
      requestAnimationFrame(gameLoop);

      const dt     = (time - lastTime) / 1000;
      lastTime     = time;
      const safeDt = Math.min(dt, 0.1);

      // Animate character
      if (mixer) {
          mixer.update(safeDt * (playerSpeed / 18));
          // Lock run rotation only (jump plays freely)
          if (charModel && !isJumping) charModel.rotation.set(0, Math.PI / 2, 0);
      }

      // Move forward
      player.position.z -= playerSpeed * safeDt;
      score = Math.floor(-player.position.z);
      scoreUI.innerText = score.toLocaleString();
      playerSpeed += safeDt * 0.4;
      speedUI.innerText = Math.floor(playerSpeed * 7).toString();

      // Lane lerp
      targetX = playerLane * laneWidth;
      player.position.x += (targetX - player.position.x) * 15 * safeDt;

      // Jump physics
      if (isJumping) {
        player.position.y += velocityY * safeDt;
        velocityY += gravity * safeDt;
        if (player.position.y <= 0) {
          player.position.y = 0;
          isJumping = false;
          velocityY = 0;
          // Return heavily back to run animation when landed
          if (jumpAction && runAction) {
             runAction.reset().fadeIn(0.2).play();
             jumpAction.fadeOut(0.2);
          }
        }
      }

      // Camera - higher angle so you can see holes ahead (like the reference image)
      camera.position.x = player.position.x * 0.5;
      camera.position.y = Math.max(player.position.y * 0.5 + 7, 6);  // higher up
      camera.position.z = player.position.z + 11;                     // further back
      camera.lookAt(player.position.x * 0.3, 0, player.position.z - 15);

      // Keep portal in distance (follows player Z so fog works correctly)
      if (window.bgPortal) {
          const pz = player.position.z - 700;
          window.bgPortal.position.z = pz;
          window.bgPortalInner.position.z = pz;
          window.bgDisk.position.z = pz + 0.1;
          // Slow rotation for atmosphere
          window.bgPortal.rotation.z += 0.003;
          window.bgPortalInner.rotation.z -= 0.005;
      }
      
      // Keep deep floor grid under the player
      if (window.floorGrid) {
          // Snap to multiples of its depth to make the scroll seamless
          window.floorGrid.position.z = player.position.z - (player.position.z % 50) - 500;
      }

      // Spawn rows
      if (player.position.z - 120 < spawnZ) createPlatformRow(false);

      // Platform logic
      const zMargin = platformDepth / 2 + 0.5;
      let standValid = isJumping; // air = safe

      for (let i = platforms.length - 1; i >= 0; i--) {
        const p = platforms[i];

        // Trigger fall if passed (only for floor platforms)
        if (!p.userData.isBuilding && (p.position.z > player.position.z + 1 ||
           (Math.abs(p.position.z - player.position.z) < zMargin &&
            Math.abs(targetX - p.position.x) < 0.1 &&
            player.position.y <= 0))) {
          p.userData.isFalling = true;
        }

        if (p.userData.isFalling && !p.userData.isBuilding) {
          p.position.y -= 15 * safeDt;
          p.material.opacity -= 3 * safeDt;
          const wire = p.children.find(c => c.name === 'wireframe');
          if (wire) wire.material.color.setHex(0xffffff);
        }

        // Ground check
        if (!p.userData.isBuilding && !isJumping &&
            Math.abs(targetX - p.position.x) < 0.1 &&
            Math.abs(player.position.z - p.position.z) <= zMargin) {
          standValid = true;
        }

        // Cleanup
        if (p.position.y < -15 || p.position.z > player.position.z + 20) {
          scene.remove(p);
          platforms.splice(i, 1);
        }
      }

      // Death
      if (!isJumping && player.position.y === 0 && !standValid) {
        if (!window.GOD_MODE) {
           triggerDeath();
        }
      }

      renderer.render(scene, camera);
    }

    // ─── DEATH ───────────────────────────────────────────────────────────────────
    function triggerDeath() {
      isRunning = false;

      const iv = setInterval(() => {
        player.position.y -= 1.5;
        renderer.render(scene, camera);
        if (player.position.y < -20) {
          clearInterval(iv);
          showGameOver();
        }
      }, 16);
    }

    function showGameOver() {
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('neon_runner_high', highScore);
        highScoreUI.innerText = highScore.toLocaleString();
      }
      finalScoreUI.innerText = score.toLocaleString();
      gameOverScreen.style.display = 'flex';
    }

    // ─────────────────────────────────────────────────────────────────────────────
    init3D();
    renderer.render(scene, camera);
  </script>
</body>
</html>
