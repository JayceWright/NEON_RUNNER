<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON RUNNER - J.A.R.V.I.S. Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Sora', sans-serif;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: #ff0055;
            text-transform: uppercase;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 0, 85, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            to {
                bottom: -100px;
            }
        }
    </style>
</head>

<body>

    <div class="ui-overlay p-8">
        <div class="flex justify-between items-start">
            <div class="text-2xl font-black tracking-widest italic">NEON_RUNNER</div>
            <div class="text-right">
                <div class="text-xs text-cyan-400">HIGH SCORE</div>
                <div class="text-2xl font-bold text-white">1,240,500</div>
            </div>
        </div>

        <div class="absolute bottom-32 left-8 border-l-4 border-cyan-400 pl-4">
            <div class="text-xs text-cyan-400">CURRENT SPEED</div>
            <div class="text-3xl font-bold text-white">142 <span class="text-sm">KM/H</span></div>
        </div>

        <div
            class="absolute bottom-8 left-0 w-full flex justify-around items-center bg-black/50 py-4 backdrop-blur-md border-t border-pink-500/30">
            <div class="text-pink-500 font-bold opacity-100">RUN</div>
            <div class="text-white/50 font-bold">CREW</div>
            <div class="text-white/50 font-bold">VAULT</div>
            <div class="text-white/50 font-bold">WORLD</div>
        </div>
        <div class="scanline"></div>
    </div>

    <script>
        let scene, camera, renderer, platforms = [];
        const tunnelWidth = 10;
        const platformCount = 50;
        let speed = 0.5;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.07);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Свет
            const light = new THREE.PointLight(0xff0055, 1, 100);
            light.position.set(0, 5, 0);
            scene.add(light);

            // Создаем начальные платформы
            for (let i = 0; i < platformCount; i++) {
                createPlatform(i * -2);
            }

            animate();
        }

        function createPlatform(z) {
            const geometry = new THREE.BoxGeometry(2.5, 0.2, 1.8);
            const material = new THREE.MeshBasicMaterial({
                color: Math.random() > 0.3 ? 0x00ffff : 0xff0055,
                wireframe: false,
                transparent: true,
                opacity: 0.8
            });
            const platform = new THREE.Mesh(geometry, material);

            // Расставляем по 3 линиям (как в Subway Surfers)
            const lanes = [-3, 0, 3];
            platform.position.set(lanes[Math.floor(Math.random() * lanes.length)], 0, z);

            // Добавляем неоновую рамку
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
            platform.add(line);

            scene.add(platform);
            platforms.push(platform);
        }

        function animate() {
            requestAnimationFrame(animate);

            platforms.forEach((p, index) => {
                p.position.z += speed;

                // Эффект исчезновения при приближении к игроку (z > 2)
                if (p.position.z > -2) {
                    p.material.opacity -= 0.05;
                    p.scale.y -= 0.05;
                }

                // Респаун платформы вдали
                if (p.position.z > 5) {
                    p.position.z = -platformCount * 1.5;
                    p.position.x = [-3, 0, 3][Math.floor(Math.random() * 3)];
                    p.material.opacity = 0.8;
                    p.scale.y = 1;
                }
            });

            // Легкое покачивание камеры для динамики
            camera.position.y = 2 + Math.sin(Date.now() * 0.005) * 0.05;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>

</html>
